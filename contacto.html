<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - EL RAYO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="navbar" id="navbar">
        <div class="container nav-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center;">
                    <img src="logo.jpg" alt="EL RAYO Logo" class="logo-img">
                </a>
            </div>
            <button class="menu-toggle" id="mobile-menu-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav-menu" id="nav-menu">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="catalogo.html">Catálogo</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="citas.html">Citas</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- CONTACT SECTION -->
        <section class="section reveal" style="padding-top: 200px;">
            <div class="container">
                <h2 class="section-title">CONEXIÓN <span style="color: var(--color-accent);">DIRECTA</span></h2>

                <div class="contact-grid">
                    <div class="contact-info">
                        <p>Calle Falsa 123, Ciudad de México</p>
                        <p><strong>Tel:</strong> +52 56 5218 9129</p>
                        <p><strong>Email:</strong> vip@elrayo.com</p>
                    </div>

                    <div class="form-wrapper">
                        <form class="custom-form">
                            <div class="form-group">
                                <label>Nombre</label>
                                <input type="text" required>
                            </div>

                            <div class="form-group">
                                <label>Correo</label>
                                <input type="email" required>
                            </div>

                            <div class="form-group">
                                <label>Mensaje</label>
                                <textarea rows="5" required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary">Enviar</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 EL RAYO</p>
        </div>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0, rootMargin: '0px 0px -50px 0px' });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (navbar) {
                if (window.scrollY > 50) navbar.classList.add('scrolled');
                else navbar.classList.remove('scrolled');
            }
        });
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenuEl = document.getElementById('nav-menu');
        if (menuBtn && navMenuEl) {
            menuBtn.addEventListener('click', () => navMenuEl.classList.toggle('active'));
        }
    </script>
    <script type="module" src="src/main.js"></script>
</body>

</html>
