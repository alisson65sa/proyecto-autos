<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Vehículo - EL RAYO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="navbar" id="navbar">
        <div class="container nav-container">
            <div class="logo">
                <a href="index.html" style="display: flex; align-items: center;">
                    <img src="logo.jpg" alt="EL RAYO Logo" class="logo-img">
                </a>
            </div>
            <button class="menu-toggle" id="mobile-menu-btn">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav-menu" id="nav-menu">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="catalogo.html">Catálogo</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="citas.html">Citas</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li><a href="contacto.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section reveal" style="padding-top: 200px; min-height: 80vh;">
            <div class="container">

                <div style="margin-bottom: 4rem;">
                    <a href="catalogo.html" style="color: var(--color-accent); text-decoration: none;">
                        ← Volver al catálogo
                    </a>
                </div>

                <div id="detalle-container">
                    <!-- Contenido dinámico -->
                </div>

            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 EL RAYO</p>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });
        }
    </script>

    <script type="module" src="src/main.js"></script>
</body>

</html>
